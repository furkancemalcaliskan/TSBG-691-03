<html lang="tr">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authentication Demo Desktop</title>
    <link rel="stylesheet" href="styles.css" />

    <main class="page">

      <p>Electron istemcisi JWT login yapar ve protected endpoint cagirir.</p>

      <section class="panel">

          <button id="login">JWT login</button>

        <h2>Token</h2>
        <pre id="token">Token yok</pre>

      <section class="panel">
        <h2>Sonuc</h2>
        <pre id="result">Sonuc burada gorunecek.</pre>
      </section>
    </main>

    <script src="renderer.js"></script>
